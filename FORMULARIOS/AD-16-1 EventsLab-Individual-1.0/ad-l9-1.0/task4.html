<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Document</title>
</head>
<body>
    <div class="header">
        <!-- div: se usa para agrupar elementos, puede contener casi cualquier elemento-->
        <!-- section: definir secciones de un documento, agrupando contenido relacionado de manera lógica.
             se agrega un id o una clase para poder manipular en JS o dar estilo en css
             Usa class cuando:

             Necesitas aplicar los mismos estilos o comportamiento a múltiples elementos.

             Quieres agrupar varios elementos para un propósito común, como estilos consistentes o manipulación con JavaScript.

             Usa id cuando:

             Necesitas identificar un elemento único.

             Quieres aplicar estilos o comportamientos específicos a un solo elemento.

             Estás trabajando con anclajes o fragmentos de URL-->
    </div>
    <section id="container">
        <!-- ul: Lista desordenada
             li: elemento de una lista-->
        <ul>
            <li class="first">one</li>
            <li class="second">two</li>
            <li class="third">three</li>
        </ul>
        <ol>
            <li class="first">one</li>
            <li class="second">two</li>
            <li class="third">three</li>
        <!-- ol:lista ordenada-->
        </ol>
    </section>
    <div class="footer">
    </div>
    <script src="task4.js" type="text/javascript"></script>
</body>
</html>
