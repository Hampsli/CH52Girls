<!DOCTYPE html>
  <html>
    <head>
      <meta charset=utf-8 />
      <title>Return first and last name from a form - w3resource</title>
    </head>
    
    <body>
      <!-- form: define un formulario
           id: asigna un identificador al formulario
           onsubmit="getFormvalue()
           onsubmit: propiedad que se usa para definir una accion 
           o acciones cuando sea enviado un formulario
           Para este caso, la función getFormvalue se ejecutará cuando el formulario sea enviado"-->
      <form id="form1" onsubmit="getFormvalue()">
        <!--First name: indicativo (etiqueta) que aparece en el formulario
            input: entrada a un formulario
            type="text": indica que el tipo de entrada es de texto 
            name (campo de entrada)="fname" da un nombre al campo de entrada
            value: Establece el valor predetermiando al campo de entrada
            se puede quitar value, y esto permitira al usuario ingresar cualquier otro dato
            <br>: salto de línea, coloca el siguiente contenido en una
                  nueva línea
            -->
          First name: <input type="text" name="fname" value="David"><br>
          Last name: <input type="text" name="lname" value="Beckham"><br>
        <input type="submit" value="Submit">
      </form>
    <script src="task2.js" type="text/javascript"></script>
    </body>
</html>
