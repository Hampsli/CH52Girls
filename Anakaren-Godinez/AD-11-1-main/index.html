<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">
  <title>Evaluación de Uso de Bootstrap</title>
  <link href="style.css" rel="stylesheet" type="text/css" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>

<body>
  <div class="container-fluid">
    <button class="btn btn-primary">Boton 1</button>
    <button class="btn btn-info">Boton 2</button>
    <button class="btn btn-warning">Boton 3</button>

    <p class="text-start">Left</p>
    <p class="text-center text-danger">Center</p>
    <p class="text-end">Right</p>


    <div class="card" style="width: 18rem;">
      <img src="https://dulcedetalle.net/wp-content/uploads/2021/11/canasta-fruta-grande.jpeg" class="card-img-top" alt="...">
      <div class="card-body">
        <h5 class="card-title">Task card</h5>
        <ul class="list-group">
          <li class="list-group-item">Uvas</li>
          <li class="list-group-item">Kiwi</li>
          <li class="list-group-item">Piña</li>
          <li class="list-group-item">Manzana</li>
          <li class="list-group-item">Durazno</li>
          <li class="list-group-item">Plátano</li>
        </ul>
        <a href="#" class="btn btn-primary">Go somewhere</a>
      </div>
    </div>

  <div id="liveAlertPlaceholder"></div>
  <button type="button" class="btn btn-primary" id="liveAlertBtn">Show live alert</button>



  <!--Grid/Rejilla-->
  <div class="container text-center my-5 border border-primary">
    <div class="row border border-secondary my-5 mx-1">
      <div class="col-7 border border-danger my-3 ">
        Columna01
      </div>
      <div class="col-2 border border-danger my-3 ">
        Columna02
      </div>
      <div class="col-3 border border-danger my-3 ">
        Columna03
      </div>
      <div class=" col-7 col-sm-12 col-xxl-7 border border-danger my-3 ">
        Columna01
      </div>
      <div class="col-2 col-sm-12 col-xxl-2 border border-danger my-3 ">
        Columna02
      </div>
      <div class="col-3 col-sm-12 col-xxl-3 border border-danger my-3 ">
        Columna03
      </div>
    </div>
  </div>
  <!--Formulario-->
  <form>
    <div class="mb-3">
      <label for="exampleInputEmail1" class="form-label">Correo electrónico</label>
      <input type="email" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp">
      <div id="emailHelp" class="form-text">No compartimos con nadie más</div>
      <!--Div vacio para manejar validaciones-->
      <div id="validation"></div>
    </div>
    <div class="mb-3">
      <label for="exampleInputPassword1" class="form-label">Contraseña</label>
      <input type="password" class="form-control" id="exampleInputPassword1">
      <!--Div vacio para manejar validaciones de contraseña-->
      <div id="validation-password"></div>
    </div>
    <div class="mb-3 form-check">
      <input type="checkbox" class="form-check-input" id="exampleCheck1">
      <label class="form-check-label" for="exampleCheck1">Recuerdame</label>
    </div>
    <button type="submit" class="btn btn-primary">Enviar</button>
  </form>
</div>

<!--Navbar-->
<nav class="navbar navbar-expand-lg bg-body-tertiary">
  <div class="container-fluid">
    <a class="navbar-brand" href="#">GenMX</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavAltMarkup" aria-controls="navbarNavAltMarkup" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
      <div class="navbar-nav">
        <a class="nav-link active" aria-current="page" href="#">Inicio</a>
        <a class="nav-link" href="#">Novedades</a>
        <a class="nav-link" href="#">Precios</a>
        <a class="nav-link disabled" aria-disabled="true">Deshabilitado</a>
      </div>
    </div>
  </div>
</nav>






  <script src="script.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
  </body>
