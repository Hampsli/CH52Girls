<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1>Demostración</h1>
    <h2>Alerta</h2>
    <!--Función de alert-->
    <p>Haz click en este botón!</p>
    <button onclick="alertFunction()">Haz click</button>

    <h2>Ejemplo de console.log</h2>
    <p>Accede a tu consola!</p>

    <h2>Onlick</h2>
    <p>Da click aqui!</p>
    <button onclick="daClick()">Da click aqui!</button>

    <h2>Span</h2>
    <p><span id="red">Las Manzanas</span> son rojas</p>
    <p><span id="pink">La Pitaya</span> es rosa</p>
    <p><span id="yellow">Las Piña</span> es amarilla</p>

    <!--La función de alert permite a los sitios web crear venatanas emergentes
    para mis usuarios
    
    console.log es una herramienta de depuración que se usa
    para ver lo que esta haciendo el programa
    
    Onclick nos permite que un elemento sea más interactivo
    
    span permite seleccionar contenido específico dentro de un elemento
    -->
    <script src="script.js"></script>
  </body>
</html>
