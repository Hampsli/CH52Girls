<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">
  <title>replit</title>
  <link href="style.css" rel="stylesheet" type="text/css" />
  <!-- Tarea 1 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>

<body>
  <!-- Tarea 2 -->
  <!-- Contenedor fluido-->
  <div class="container-fluid">
    
    <div class="text-hello">
      <h1>Hello world</h1>
    </div>

    <!-- Tarea 3 -->
    <!-- Tres botones de colores diferentes -->
    <div class="btn-tr">
      <button type="button" class="btn btn-primary">Primary</button>
      <button type="button" class="btn btn-secondary">Secondary</button>
      <button type="button" class="btn btn-success">Success</button>
    </div>

    <!-- Tarea 4 -->
    <!-- Alineacion de texto -->
    <div class="text-align">
      <p class="text-start">Izquierda</p>
      <p class="text-center">Centro</p>
      <p class="text-end">Derecha</p>
    </div>

    <!-- Tarea 5 -->
    <!-- Card con imagen de canasta de frutas y lista de grupos-->

    <div class="card" style="width: 18rem;">
      <img src="https://i.pinimg.com/736x/95/7c/66/957c66ff1fba78e3a71db908cef7957e.jpg" class="card-img-top" alt="...">
      <div class="card-body">
        <h5 class="card-title">Hoja de ruta</h5>
        <ul class="list-group">
          <li class="list-group-item">Fresa</li>
          <li class="list-group-item">Uva</li>
          <li class="list-group-item">Manzana</li>
        </ul>
        <a href="#" class="btn btn-primary">Da clic</a>
      </div>
    </div>
  </div>

  <script src="script.js"></script>

  <!--
  This script places a badge on your repl's full-browser view back to your repl's cover
  page. Try various colors for the theme: dark, light, red, orange, yellow, lime, green,
  teal, blue, blurple, magenta, pink!
  -->
  <script src="https://replit.com/public/js/replit-badge-v2.js" theme="dark" position="bottom-right"></script>
  <!-- Tarea 1 -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
    crossorigin="anonymous"></script>
</body>

</html>
