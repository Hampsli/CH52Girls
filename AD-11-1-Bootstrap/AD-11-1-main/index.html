<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">
  <title>Ejercicio Bootstrap</title>
  <link href="style.css" rel="stylesheet" type="text/css" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>
  Hello world
  <div class="container mt-4"> 
    <!-- Tarea 3: Botones -->
    <div class="d-flex justify-content-around mb-4">
        <button class="btn btn-primary">Azul</button>
        <button class="btn btn-success">Verde</button>
        <button class="btn btn-danger">Rojo</button>
    </div>

    <!-- Tarea 4: Párrafos alineados -->
    <div class="mb-4">
        <p class="text-start">Texto alineado a la izquierda</p>
        <p class="text-center text-danger">Texto alineado al centro</p>
        <p class="text-end">Texto alineado a la derecha</p>
    </div>

    <!-- Tarea 5: Tarjeta -->
    <div class="card mx-auto" style="width: 18rem;">
        <div class="card-header">Frutas</div>
        <img src="https://www.shutterstock.com/image-photo/fruit-basket-apples-bananas-oranges-260nw-1737221507.jpg" class="card-img-top" alt="Cesta de frutas">
        <ul class="list-group list-group-flush">
            <li class="list-group-item">Manzana</li>
            <li class="list-group-item">Plátano</li>
            <li class="list-group-item">Naranja</li>
        </ul>

  <script src="script.js"></script>
  <script src="https://replit.com/public/js/replit-badge-v2.js" theme="dark" position="bottom-right"></script>
</body>

</html>

<!--Cargaste Bootstrap 📦

Usaste un CDN para que tu página pueda usar los estilos y componentes de Bootstrap sin necesidad de descargar nada.
Creaste un contenedor principal 📌

Usaste <div class="container"> para que todo el contenido esté bien organizado y tenga un diseño más limpio y centrado en la página.
Añadiste tres botones de colores diferentes 🎨

Cada botón tiene un color diferente gracias a las clases de Bootstrap:
Azul: btn-primary
Verde: btn-success
Rojo: btn-danger
Usaste d-flex justify-content-around para que los botones se distribuyan de forma ordenada.
Alineaste tres párrafos de texto 📄

Izquierda (text-start)
Centro y rojo (text-center text-danger)
Derecha (text-end)
Bootstrap facilita esto con sus clases de alineación y colores.
Creaste una tarjeta con una imagen y una lista de frutas 🍎🍌🍊

Usaste una card, que es un componente de Bootstrap que ya tiene un diseño bonito.
Dentro de la tarjeta:
card-header: título de la tarjeta.
card-img-top: imagen de una cesta de frutas (usamos una imagen genérica por ahora).
list-group: una lista con nombres de frutas.-->
