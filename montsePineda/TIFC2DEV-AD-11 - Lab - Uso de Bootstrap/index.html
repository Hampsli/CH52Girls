<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">
  <title>TIFC2DEV-AD-11 - Lab - Uso de Bootstrap</title>
  <link href="style.css" rel="stylesheet" type="text/css" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" 
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>

<body>
  
  <script src="script.js"></script>

  <!--Tarea 2:  Tener la anchura variable que contenga todos los componentes y utilidades dentro de ella.-->
  <div class=".container-fluid">

  <!--Tarea 3: Botones y Color-->
  <button type="button" class="btn btn-primary">Boton 1-verde</button>
  <button type="button" class="btn btn-outline-warning">Boton 2</button>
  <button type="button" class="btn btn-secondary">Boton 3</button>


  <!--Tarea 4: Utilidades para alinear texto -->
  <p class="text-start">Left.</p>
  <p class="text-center text-danger">Center </p> <!--text-danger, es una clase de Bootstrap, hace que el texto se vuelva rojo-->
  <p class="text-end" >Right</p>



  <!--Tarea 5: Añadir una tarjeta que tenga un grupo de listas.-->

  <div class="card" style="width: 18rem;">
    <img src="https://www.trepsi.com.mx/wp-content/uploads/2023/08/canasta-frutas.png" class="card-img-top" alt="Canasta de frutas">
    <div class="card-body">
      <h5 class="card-title">Task card</h5>
      <ul class="list-group list-group-flush">
        <li class="list-group-item">Apple</li>
        <li class="list-group-item">Orange</li>
        <li class="list-group-item">Banana</li>
        <li class="list-group-item">Pear</li>
        <li class="list-group-item">Pomegrade</li>
        <li class="list-group-item">Tablecloth</li>
      </ul>
    </div>
  </div>


  </div>
  <!--
  This script places a badge on your repl's full-browser view back to your repl's cover
  page. Try various colors for the theme: dark, light, red, orange, yellow, lime, green,
  teal, blue, blurple, magenta, pink!
  -->
  <script src="https://replit.com/public/js/replit-badge-v2.js" theme="dark" position="bottom-right"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" 
  integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>

</html>
