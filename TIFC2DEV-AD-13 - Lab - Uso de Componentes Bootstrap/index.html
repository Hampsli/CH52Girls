  <!--Tarea 3: Usar la rejilla de Bootstrap para hacer un diseño básico del sitio web.-->
  <div class="container text-center">
    <div class="row my-1" >
        <div class="col-2 border border-primary text-start ">
          El lado izquierdo
        </div>
        <div class="col-8 border border-primary text-center">
          El lado central
        </div>
        <div class="col-2 border border-primary text-end">
          El lado derecho 
        </div>

        Pie de página
      </div>
    </div>

  <!--Tarea 4: Agregar un formulario básico-->
  <form class="container-fluid">
    <div class="border border-danger my-1">
      <div class="border border-primary mb-3 my-1">
          <label for="exampleFormControlInput1" class="form-label">Correo electrónico</label>
          <input type="email" class="form-control border border-secondary my-1" id="exampleFormControlInput1" placeholder="name@example.com">
      </div>
      <div class="border border-primary mb-3">
          <label for="exampleFormControlTextarea1" class="form-label">Área de texto</label>
          <textarea class="form-control border border-secondary my-1" id="exampleFormControlTextarea1" rows="3"></textarea>
      </div>
      <button type="submit" class="btn btn-primary container-fluid">Enviar</button>
    </div>
  </form>
